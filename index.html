<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día Mamá Maritza 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:        #c0272d;
  --red-deep:   #8b1a1f;
  --red-light:  #e85560;
  --pink:       #f48ea0;
  --pink-light: #fce4e8;
  --white:      #fffafa;
  --cream:      #fff5f6;
  --text:       #2a0a0d;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background-color: var(--white);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
}

#hearts-canvas {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:0;
}

.page-wrap { position:relative; z-index:1; }

/* ── HERO ── */
.hero {
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  padding:80px 28px 100px;
  background:
    radial-gradient(ellipse 90% 70% at 50% 0%,  rgba(255,180,190,.55) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 5%  80%,  rgba(255,140,150,.35) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 95% 70%,  rgba(255,140,150,.35) 0%, transparent 55%),
    var(--white);
  position:relative; overflow:hidden;
}

.hero-heart {
  position:absolute; pointer-events:none;
  opacity:.11; font-size:clamp(80px,18vw,160px);
  animation:pulse 4s ease-in-out infinite;
}
.hero-heart.tl{top:-20px;left:-20px;animation-delay:0s;}
.hero-heart.tr{top:-20px;right:-20px;animation-delay:.8s;}
.hero-heart.bl{bottom:-20px;left:-20px;animation-delay:1.6s;}
.hero-heart.br{bottom:-20px;right:-20px;animation-delay:2.4s;}
@keyframes pulse{0%,100%{scale:1}50%{scale:1.09}}

.hero-badge {
  display:inline-block;
  border:1.5px solid var(--pink); color:var(--red);
  font-size:12px; letter-spacing:4px; text-transform:uppercase;
  padding:7px 24px; border-radius:40px; margin-bottom:30px;
  background:rgba(255,255,255,.6); backdrop-filter:blur(6px);
  animation:fadeDown .8s ease both;
}

.hero-title {
  font-family:'Dancing Script',cursive;
  font-size:clamp(58px,15vw,130px); line-height:1;
  color:var(--red);
  text-shadow:2px 4px 22px rgba(192,39,45,.28);
  animation:fadeDown .9s .1s ease both;
}

.hero-sub {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:clamp(18px,5vw,34px); color:var(--red-light);
  margin-top:8px; animation:fadeDown 1s .2s ease both;
}

.hero-name {
  font-family:'Playfair Display',serif; font-weight:700;
  font-size:clamp(22px,6vw,50px); color:var(--text);
  margin-top:16px; animation:fadeDown 1s .3s ease both;
}

.hero-tagline {
  font-size:clamp(15px,3.2vw,20px); color:#7a2530;
  line-height:1.75; max-width:460px; margin-top:14px;
  animation:fadeDown 1s .4s ease both;
}

.scroll-hint {
  position:absolute; bottom:26px; left:50%; transform:translateX(-50%);
  color:var(--red); font-size:11px; letter-spacing:3px; text-transform:uppercase;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  animation:fadeIn 1.5s 1s ease both;
}
.scroll-hint .arr{animation:bob 2s infinite;}
@keyframes bob{0%,100%{translate:0 0}50%{translate:0 7px}}

@keyframes fadeDown{from{opacity:0;translate:0 -22px}to{opacity:1;translate:0 0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── SHARED ── */
section{padding:80px 24px;position:relative;z-index:1;}

.sec-label{
  text-align:center; font-size:11px; letter-spacing:5px;
  text-transform:uppercase; color:var(--red); margin-bottom:10px;
}
.sec-title{
  text-align:center; font-family:'Playfair Display',serif;
  font-style:italic; font-size:clamp(26px,6vw,46px);
  color:var(--text); margin-bottom:44px;
}
.sec-title em{color:var(--red);font-style:normal;}

.divider{
  display:flex; align-items:center; justify-content:center;
  gap:14px; max-width:280px; margin:0 auto 46px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,var(--pink));
}
.divider::after{background:linear-gradient(to left,transparent,var(--pink));}

/* ── GALLERY ── */
.gallery-section{
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,200,210,.3) 0%,transparent 70%),
    var(--white);
}

.gallery-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:22px; max-width:980px; margin:0 auto;
}

.photo-card{
  position:relative; border-radius:22px; overflow:hidden;
  aspect-ratio:4/5; background:var(--pink-light);
  box-shadow:0 8px 40px rgba(192,39,45,.13);
  transition:transform .35s ease,box-shadow .35s ease;
  cursor:pointer;
}
.photo-card:hover{transform:translateY(-6px) rotate(.3deg);box-shadow:0 20px 52px rgba(192,39,45,.22);}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease;}
.photo-card:hover img{transform:scale(1.05);}
.photo-card::before{
  content:'❤'; position:absolute; top:10px;right:12px;
  font-size:22px; color:var(--red); opacity:.7; z-index:2;
  text-shadow:0 2px 8px rgba(0,0,0,.15);
}
.photo-caption{
  position:absolute; bottom:0;left:0;right:0;
  padding:32px 18px 16px;
  background:linear-gradient(to top,rgba(80,0,10,.72) 0%,transparent 100%);
  color:#fff; font-family:'Dancing Script',cursive; font-size:20px;
  opacity:0; transition:opacity .3s;
}
.photo-card:hover .photo-caption{opacity:1;}

.photo-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--red);font-size:15px;text-align:center;padding:24px;
  border:2px dashed var(--pink);border-radius:22px;
}
.photo-placeholder .ph-icon{font-size:44px;opacity:.45;}

/* ── QUOTES ── */
.quotes-section{
  background:
    radial-gradient(ellipse 70% 70% at 20% 50%,rgba(255,150,160,.1) 0%,transparent 65%),
    radial-gradient(ellipse 60% 60% at 80% 50%,rgba(255,150,160,.1) 0%,transparent 65%),
    var(--cream);
}

.quotes-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:26px;max-width:960px;margin:0 auto;
}

.quote-card{
  background:rgba(255,255,255,.82); backdrop-filter:blur(10px);
  border:1px solid rgba(192,39,45,.18); border-radius:24px;
  padding:34px 26px; text-align:center;
  box-shadow:0 4px 28px rgba(192,39,45,.09);
  transition:transform .3s ease,box-shadow .3s ease;
  position:relative;overflow:hidden;
}
.quote-card::before{
  content:'\201C';position:absolute;top:-18px;left:14px;
  font-family:'Playfair Display',serif;
  font-size:110px;color:var(--red);opacity:.07;line-height:1;
}
.quote-card:hover{transform:translateY(-5px);box-shadow:0 14px 42px rgba(192,39,45,.16);}
.q-icon{font-size:30px;margin-bottom:14px;display:block;}
.q-text{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(15px,2.8vw,19px);line-height:1.7;color:var(--text);
}
.q-attr{display:block;margin-top:16px;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--red);}

/* ── MESSAGE ── */
.message-section{
  background:
    radial-gradient(ellipse 90% 60% at 50% 100%,rgba(192,39,45,.06) 0%,transparent 70%),
    var(--white);
}
.message-card{
  max-width:660px;margin:0 auto;
  background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,220,226,.55));
  border:1.5px solid rgba(192,39,45,.2);border-radius:32px;
  padding:clamp(36px,8vw,62px) clamp(28px,6vw,58px);
  text-align:center;box-shadow:0 14px 60px rgba(192,39,45,.11);
  position:relative;overflow:hidden;
}
.message-card::after{
  content:'❤';position:absolute;bottom:-22px;right:-8px;
  font-size:130px;opacity:.05;pointer-events:none;
}
.message-body{font-size:clamp(16px,3.4vw,21px);line-height:1.9;color:#4a1020;}
.message-body strong{color:var(--red);font-weight:400;font-style:italic;}
.message-sign{
  margin-top:30px;font-family:'Dancing Script',cursive;
  font-size:clamp(22px,5vw,36px);color:var(--red);
}

/* ── TIMELINE ── */
.timeline-section{
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,180,190,.25) 0%,transparent 60%),
    var(--cream);
}
.timeline{max-width:660px;margin:0 auto;position:relative;}
.timeline::before{
  content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom,transparent,var(--pink) 10%,var(--pink) 90%,transparent);
  transform:translateX(-50%);
}
.tl-item{display:flex;align-items:center;gap:20px;margin-bottom:38px;position:relative;}
.tl-item:nth-child(odd){flex-direction:row;}
.tl-item:nth-child(even){flex-direction:row-reverse;}
.tl-dot{
  flex-shrink:0;width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--pink));
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 4px 16px rgba(192,39,45,.32);z-index:1;
}
.tl-content{
  flex:1;background:rgba(255,255,255,.82);
  border:1px solid rgba(192,39,45,.15);border-radius:18px;
  padding:18px 22px;box-shadow:0 4px 18px rgba(192,39,45,.07);
}
.tl-content h3{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--red);margin-bottom:6px;}
.tl-content p{font-size:15px;line-height:1.65;color:#5a1a28;}
@media(max-width:540px){
  .timeline::before{left:22px;}
  .tl-item,.tl-item:nth-child(even){flex-direction:row;}
  .tl-dot{width:38px;height:38px;font-size:17px;}
}

/* ── FOOTER ── */
footer{
  text-align:center;padding:64px 24px 90px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,160,170,.4) 0%,transparent 65%),
    var(--white);
  position:relative;z-index:1;
}
.footer-heart{font-size:56px;display:inline-block;animation:heartbeat 1.4s ease-in-out infinite;}
@keyframes heartbeat{0%,100%{scale:1}14%{scale:1.18}28%{scale:1}42%{scale:1.14}70%{scale:1}}
.footer-msg{font-family:'Dancing Script',cursive;font-size:clamp(26px,6vw,46px);color:var(--red);margin:18px 0 10px;}
.footer-sub{font-size:14px;color:#a05060;letter-spacing:2px;}

/* ── LIGHTBOX ── */
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(20,0,5,.9);backdrop-filter:blur(8px);
  z-index:9999;align-items:center;justify-content:center;padding:20px;
}
.lightbox.open{display:flex;}
.lightbox img{
  max-width:90vw;max-height:85vh;object-fit:contain;
  border-radius:16px;box-shadow:0 20px 80px rgba(0,0,0,.6);
  animation:zoomIn .3s ease;
}
@keyframes zoomIn{from{scale:.85;opacity:0}to{scale:1;opacity:1}}
.lb-close{
  position:absolute;top:20px;right:24px;
  font-size:38px;color:#fff;cursor:pointer;
  opacity:.7;transition:opacity .2s;background:none;border:none;line-height:1;
}
.lb-close:hover{opacity:1;}

/* ── REVEAL ── */
.reveal{opacity:0;translate:0 28px;transition:opacity .7s ease,translate .7s ease;}
.reveal.visible{opacity:1;translate:0 0;}
</style>
</head>
